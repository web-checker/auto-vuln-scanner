#############################################################################
# 리눅스(UNIX) 서버 자동 진단 설정 파일
#   - KISA 2026 주요정보통신기반시설 기술적 취약점 분석·평가 (UNIX U-01~U-67)
#   - linux_diag.sh 가 source 하여 읽는다. (쉘 변수 정의 형식)
#   - 읽기 전용. 환경 의존 값(경로·계정·임계값)을 여기서 입력.
#   - 대상: Amazon Linux 2023 / RHEL 계열 + Debian/Ubuntu(systemd).
#     ※ Ubuntu 계열은 SYSTEM_ACCOUNTS/UNNECESSARY_* 목록을 환경에 맞게 조정 권장.
#   - 여기 선언된 변수는 모두 linux_diag.sh 에서 실제 사용됨(미사용 변수 미선언 — conf↔script 일관).
#############################################################################

# ── 핵심 파일 경로 ─────────────────────────────────────────
PASSWD_FILE="/etc/passwd"
SHADOW_FILE="/etc/shadow"
GROUP_FILE="/etc/group"
LOGIN_DEFS="/etc/login.defs"
SSHD_CONFIG="/etc/ssh/sshd_config"
PAM_DIR="/etc/pam.d"
PWQUALITY_CONF="/etc/security/pwquality.conf"   # U-02 비밀번호 복잡도(minlen 등)
PWHISTORY_CONF="/etc/security/pwhistory.conf"   # U-02 비밀번호 재사용 제한(remember)
PROFILE_FILE="/etc/profile"
SERVICES_FILE="/etc/services"
HOSTS_FILE="/etc/hosts"
HOSTS_LPD="/etc/hosts.lpd"
INETD_CONF="/etc/inetd.conf"
XINETD_DIR="/etc/xinetd.d"
SYSLOG_CONF="/etc/rsyslog.conf"
SUDOERS_FILE="/etc/sudoers"
NFS_EXPORTS="/etc/exports"
SNMPD_CONF="/etc/snmp/snmpd.conf"
LOG_DIR="/var/log"

# ── 임계값/기준 (KISA 기준) ────────────────────────────────
PASS_MAX_DAYS_MAX="90"            # U-02 비밀번호 최대 사용기간 (이하)
PASS_MIN_LEN_MIN="8"              # U-02 최소 길이 (이상)
ACCOUNT_LOCK_MAX="10"             # U-03 계정 잠금 임계값 (이하)
SESSION_TIMEOUT_MAX="600"        # U-12 세션 타임아웃 초 (이하)
UMASK_MIN="022"                  # U-30 UMASK (이 값 이상으로 제한)

# ── 권한 기준값 (8진수) ────────────────────────────────────
#   판정: 파일 권한이 기준값의 '칸별 부분집합'이면 양호 (owner/group/other 비트별).
#         예) 기준 644 → owner rw·group r·other r 까지 허용, other 쓰기/그룹 쓰기는 취약.
#             기준 400 → owner r 만 허용, group/other 접근 있으면 취약.
PERM_PASSWD_MAX="644"            # U-16 /etc/passwd
PERM_SHADOW_MAX="400"            # U-18 /etc/shadow  (소유자 root + 권한 400 부분집합)
PERM_HOSTS_MAX="644"            # U-19 /etc/hosts
PERM_INETD_MAX="600"            # U-20 inetd/xinetd
PERM_SYSLOG_MAX="640"          # U-21 rsyslog.conf
PERM_SERVICES_MAX="644"        # U-22 /etc/services
PERM_HOSTSLPD_MAX="600"        # U-29 hosts.lpd
PERM_SUDOERS_MAX="640"        # U-63 sudoers
PERM_CRON_MAX="640"          # U-37 crontab/cron·at 설정 파일
PERM_LOGFILE_MAX="644"        # U-67 로그 파일
PERM_EXPORTS_MAX="644"       # U-40 /etc/exports (NFS 설정 파일)

# ── 계정 관련 ──────────────────────────────────────────────
# 로그인 불필요(시스템) 계정 — U-11 셸이 nologin/false 여야 함 (Amazon Linux 2023 기준)
SYSTEM_ACCOUNTS="bin daemon adm sync shutdown halt mail operator dbus rpc rpcuser nobody sshd chrony tcpdump systemd-network systemd-oom systemd-resolve systemd-coredump systemd-timesync libstoragemgmt stapunpriv ec2-instance-connect"
# U-07 불필요(기본 제거 권고) 계정 후보 (RHEL/AL 계열 — 헤드리스 서버 기준)
UNNECESSARY_ACCOUNTS="games gopher ftp news lp uucp nuucp"
# U-09 불필요(기본 제거 권고) 그룹 후보 — 헤드리스 서버 기준 레거시 하드웨어/미사용 서비스 그룹
#   floppy/tape/cdrom/dialout = 레거시 하드웨어, ftp/lp/news/uucp/nuucp/games = 미사용 서비스
#   (audio/video 는 GPU·사운드 사용 시 필요할 수 있어 기본 제외 — 필요 시 추가)
UNNECESSARY_GROUPS="floppy tape ftp cdrom dialout games lp news uucp nuucp"
# 관리자(UID 0) 정상 계정 — 이 외 UID 0 이면 취약(U-05). 비우지 말 것(최소 root).
ADMIN_ACCOUNTS="root"

# ── 패치 기준 (U-64) ───────────────────────────────────────
# 보안 담당자가 벤더(AWS/배포판) 권고에 따른 '최신 패치 커널 버전'을 입력.
#   - 현재 커널(uname -r)이 이 값보다 이전이면 '취약', 같거나 이후면 '양호'.
#   - 형식은 uname -r 출력과 동일하게 입력 (예: 6.1.170-213.321.amzn2023.x86_64)
#   - 대상 호스트 OS에 맞는 값으로 갱신할 것(Ubuntu는 6.8.0-xxxx-aws 형식 등).
#   - 비워두면 '취약'(기준 미입력)으로 표시되니 점검 전 반드시 갱신할 것.
LATEST_KERNEL_VERSION="6.1.170-213.321.amzn2023.x86_64"

# ── 출력 ───────────────────────────────────────────────────
OUTPUT_DIR="./linux_diag_result"
TARGET_LABEL=""                  # 비우면 hostname
