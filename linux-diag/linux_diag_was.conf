#############################################################################
# 리눅스(UNIX) 자동 진단 설정 — [was] 전용
#   대상: was (10.0.128.149) — Ubuntu 24.04.4 LTS (systemd, Tomcat9)
#   linux_diag.sh 가 source. 실행: sudo ./linux_diag.sh -c ./linux_diag_was.conf
#   여기 선언된 변수는 모두 linux_diag.sh 에서 실제 사용됨(conf↔script 일관).
#############################################################################

# ── 핵심 파일 경로 ─────────────────────────────────────────
PASSWD_FILE="/etc/passwd"
SHADOW_FILE="/etc/shadow"
GROUP_FILE="/etc/group"
LOGIN_DEFS="/etc/login.defs"
SSHD_CONFIG="/etc/ssh/sshd_config"
PAM_DIR="/etc/pam.d"
PWQUALITY_CONF="/etc/security/pwquality.conf"   # U-02 비밀번호 복잡도(minlen 등)
PWHISTORY_CONF="/etc/security/pwhistory.conf"   # U-02 비밀번호 재사용 제한(remember)
PROFILE_FILE="/etc/profile"
SERVICES_FILE="/etc/services"
HOSTS_FILE="/etc/hosts"
HOSTS_LPD="/etc/hosts.lpd"
INETD_CONF="/etc/inetd.conf"
XINETD_DIR="/etc/xinetd.d"
SYSLOG_CONF="/etc/rsyslog.conf"
SUDOERS_FILE="/etc/sudoers"
NFS_EXPORTS="/etc/exports"
SNMPD_CONF="/etc/snmp/snmpd.conf"
LOG_DIR="/var/log"

# ── 임계값/기준 (KISA 기준) ────────────────────────────────
PASS_MAX_DAYS_MAX="90"            # U-02 비밀번호 최대 사용기간 (이하)
PASS_MIN_LEN_MIN="8"              # U-02 최소 길이 (이상)
ACCOUNT_LOCK_MAX="10"             # U-03 계정 잠금 임계값 (이하)
SESSION_TIMEOUT_MAX="600"        # U-12 세션 타임아웃 초 (이하)
UMASK_MIN="022"                  # U-30 UMASK (이 값 이상으로 제한)

# ── 권한 기준값 (8진수) ────────────────────────────────────
#   판정: 파일 권한이 기준값의 '칸별 부분집합'이면 양호 (owner/group/other 비트별).
#         예) 644 → owner rw·group r·other r 까지 허용 / 400 → owner r 만 허용.
PERM_PASSWD_MAX="644"            # U-16 /etc/passwd
PERM_SHADOW_MAX="400"            # U-18 /etc/shadow  (Ubuntu 기본 640 root:shadow → 취약. ≤400 권장)
PERM_HOSTS_MAX="644"            # U-19 /etc/hosts
PERM_INETD_MAX="600"            # U-20 inetd/xinetd
PERM_SYSLOG_MAX="640"          # U-21 rsyslog.conf
PERM_SERVICES_MAX="644"        # U-22 /etc/services
PERM_HOSTSLPD_MAX="600"        # U-29 hosts.lpd
PERM_SUDOERS_MAX="640"        # U-63 sudoers
PERM_CRON_MAX="640"          # U-37 crontab/cron·at 설정 파일
PERM_LOGFILE_MAX="644"        # U-67 로그 파일
PERM_EXPORTS_MAX="644"       # U-40 /etc/exports (NFS 설정 파일)

# ── 계정 관련 ──────────────────────────────────────────────
# U-11 로그인 불필요(시스템) 계정 — 셸이 nologin/false 여야 함 (was 실제 uid<1000 + nobody)
SYSTEM_ACCOUNTS="daemon bin sys sync games man lp mail news uucp proxy www-data backup list irc _apt systemd-network systemd-timesync dhcpcd messagebus syslog systemd-resolve uuidd tss sshd pollinate tcpdump landscape fwupd-refresh polkitd ec2-instance-connect _chrony nobody"
# U-07 불필요(기본 제거 권고) 계정 후보 (헤드리스 서버 기준 레거시)
UNNECESSARY_ACCOUNTS="games gopher ftp news lp uucp nuucp"
# U-09 불필요(기본 제거 권고) 그룹 후보 (레거시 하드웨어/미사용 서비스)
UNNECESSARY_GROUPS="floppy tape ftp cdrom dialout games lp news uucp nuucp"
# 관리자(UID 0) 정상 계정 — 이 외 UID 0 이면 취약(U-05). 비우지 말 것(최소 root).
ADMIN_ACCOUNTS="root"

# ── 패치 기준 (U-64) ───────────────────────────────────────
# was 현재 커널 기준(uname -r). 벤더(Ubuntu/AWS) 신규 패치 릴리스 시 갱신.
LATEST_KERNEL_VERSION="6.17.0-1017-aws"

# ── 출력 ───────────────────────────────────────────────────
OUTPUT_DIR="./linux_diag_result"
TARGET_LABEL=""                  # 비우면 hostname
