#############################################################################
# 웹서버(Apache) 자동 진단 설정 파일
#   - KISA 2026 주요정보통신기반시설 기술적 취약점 분석·평가 (웹 서비스 WEB-01~26)
#   - web_diag.sh 가 source 하여 읽는다. (쉘 변수 정의 형식)
#   - 핵심 자료 위치/실행계정 등 환경 의존 값을 여기서 입력.
#   - 스크립트는 '읽기'만 하며 시스템/설정을 변경하지 않는다.
#############################################################################

# ── 1. 웹서버 종류 / 경로 (Debian·Ubuntu apache2 기준) ──────
WEB_TYPE="apache"
APACHE_PREFIX="/etc/apache2"
APACHE_CONF="${APACHE_PREFIX}/apache2.conf"          # 메인 설정
PORTS_CONF="${APACHE_PREFIX}/ports.conf"             # Listen 포트
SITES_DIR="${APACHE_PREFIX}/sites-enabled"           # 활성 vhost
CONF_ENABLED_DIR="${APACHE_PREFIX}/conf-enabled"     # 활성 conf (security.conf 등)
MODS_ENABLED_DIR="${APACHE_PREFIX}/mods-enabled"     # 활성 모듈
ENVVARS="${APACHE_PREFIX}/envvars"                   # 실행계정 정의
SECURITY_CONF="${APACHE_PREFIX}/conf-enabled/security.conf"
LOG_DIR="/var/log/apache2"
DOCROOT="/var/www/html"                              # 기본 DocumentRoot

# SSL 인증서/개인키 (WEB-14/20 권한·설정 점검)
SSL_KEY_FILES="/etc/ssl/private/checkbang.key"       # 공백으로 여러 개 가능
SSL_CERT_FILES="/etc/ssl/certs/checkbang.crt"

# ── 2. 프로세스 / 서비스 (WEB-09) ──────────────────────────
APACHE_SERVICE="apache2"
# Apache 워커가 구동되어야 하는 '정상(비관리자)' 계정. master는 포트바인딩 위해 root가 정상.
EXPECTED_RUN_USERS="www-data apache nobody"
ADMIN_RUN_USERS="root"
PRIVILEGED_GROUPS="root sudo wheel admin"            # adm(로그읽기)는 제외

# ── 3. 패치 기준 (WEB-25) ──────────────────────────────────
# 점검 시점의 2.4.x 최신 릴리스로 갱신할 것 (https://httpd.apache.org/download.cgi).
MIN_APACHE_VERSION="2.4.66"

# ── 4. 권한 기준값 (WEB-14 / WEB-26)  — 8진수 ──────────────
SSL_KEY_MAX_PERM="600"      # SSL 개인키 최대 허용 권한 (칸별 부분집합 기준)
CONF_FILE_MAX_PERM="750"    # 설정 파일·활성 vhost 최대 허용 권한 (KISA 조치 chmod 750과 일치, 칸별 부분집합)
LOG_DIR_MAX_PERM="750"
LOG_FILE_MAX_PERM="640"

# ── 5. 출력 ────────────────────────────────────────────────
OUTPUT_DIR="./web_diag_result"
TARGET_LABEL=""             # 비우면 hostname
