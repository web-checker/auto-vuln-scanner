# =============================================================
# cloud_diag.conf - 환경 의존값 (경로/계정/임계값)
# SK쉴더스 2024 클라우드 보안가이드(AWS) 자동 진단
# 규칙(DIAG_STYLE §6): 선언=사용. 스크립트가 안 쓰는 변수 선언 금지.
#   set -u 환경이므로 스크립트가 참조하는 변수는 여기서 반드시 정의.
#   선택값은 스크립트에서 ${VAR:-기본값} 으로 처리.
# =============================================================

# ---- 접속/대상 ----
# AWS 프로파일/리전. 비워두면 CLI 기본 프로파일·환경설정 리전 사용.
AWS_PROFILE_DEFAULT=""
REGION_DEFAULT=""

# 진단대상(자산 종류 상수) — CSV '진단대상' 컬럼에 그대로 기록
TARGET_SYS="Cloud(AWS)"

# ---- 점검 범위(범용화) ----
# 점검 대상 IAM 사용자 화이트리스트(공백 구분).
#   비우면("") 계정 내 전체 IAM 사용자를 대상으로 한다(범용 기본값).
#   특정 시나리오만 점검하려면 예: SCENARIO_USERS="Checkbangs3 EC2admin"
SCENARIO_USERS="checkbang-s3-connect EC2-ADMIN"

# ---- 조치 예외 리소스(웹 구성상 의도된 설정 등) ----
# 등록된 리소스는 취약으로 잡되 [조치 예외사항] 으로 표기(공백 구분, 비우면 예외 없음).
#   예: EXCEPT_SG="sg-077fa5f2efcc13f11"
EXCEPT_SG=""
#   예: EXCEPT_BUCKET="s3-checkbang-files"
EXCEPT_BUCKET=""
# 로그 보관 점검(4.12)에서 제외할 로그 그룹 패턴(부분일치, 공백 구분).
#   예: EXCEPT_LOG="/aws/lambda/Lambda-SK"
EXCEPT_LOG="/aws/lambda/Lambda-SK"

# 1.4 그룹 점검에서 제외할 IAM 그룹(시스템/서비스 그룹 등, 공백 구분, 비우면 전체).
EXCEPT_GROUP="CostManagers 
student Student_Ohio Student_Oregon Student_Osaka Student_Seoul Student_Tokyo"

# 2.x 권한 점검에서 'AWS 자동생성 역할'로 보고 숨길 역할 이름 패턴(부분일치, 공백 구분).
#   ※ path가 /aws-service-role/(서비스 연결)·/service-role/(서비스 역할)인 역할은 항상 자동 제외.
#     아래는 path가 '/' 라서 그것만으론 안 걸리는 AWS 기능 생성 역할용 보강 패턴.
AWS_ROLE_HIDE_PATTERNS="AWS-QuickSetup QuickSetup DefaultServiceRole CloudTrail_CloudWatchLogs CloudWatchLogs_Role cwl-export"

# ---- 판정 임계값(가이드/조치 기준) ----
PW_MIN_LEN=8           # 1.10 패스워드 최소 길이
PW_MAX_AGE=90          # 1.10 패스워드 최대 사용기간(일)
KEY_MAX_DAYS=60        # 1.8  Access Key 사용주기 상한(일)
STALE_DAYS=90          # 1.4  그룹 멤버 '불필요(장기 미사용)' 판정(일)
LOG_MIN_DAYS=365       # 4.12 로그 최소 보관기간(일, 1년)
S3_KEYFILE_MAXKEYS=2000 # 1.6  Key Pair 보관 점검 시 버킷당 S3 객체 키 스캔 상한(비용/시간 방어)
