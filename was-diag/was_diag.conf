#############################################################################
# WAS(Tomcat) 자동 진단 설정 파일
#   - KISA 2026 주요정보통신기반시설 기술적 취약점 분석·평가 (웹 서비스 WEB-01~26)
#   - 이 파일은 was_diag.sh 가 source 하여 읽는다. (쉘 변수 정의 형식)
#   - 진단 대상의 "핵심 자료 위치"와 "관리자 계정명" 등 환경 의존 값을 여기서 입력.
#   - 스크립트는 이 값을 '읽기'만 하며 시스템/설정을 변경하지 않는다.
#############################################################################

# ─────────────────────────────────────────────────────────────
# 1. WAS 종류 / 설치 경로 (핵심 자료 위치)
# ─────────────────────────────────────────────────────────────
WAS_TYPE="tomcat"                       # 현재 스크립트는 tomcat 만 지원

CATALINA_HOME="/opt/tomcat9"            # Tomcat 설치 디렉터리
CATALINA_BASE="/opt/tomcat9"            # 멀티 인스턴스가 아니면 HOME과 동일

CONF_DIR="${CATALINA_BASE}/conf"
WEBAPPS_DIR="${CATALINA_BASE}/webapps"
LOG_DIR="${CATALINA_BASE}/logs"

# 핵심 설정 파일 (절대경로)
SERVER_XML="${CONF_DIR}/server.xml"
WEB_XML="${CONF_DIR}/web.xml"
CONTEXT_XML="${CONF_DIR}/context.xml"
TOMCAT_USERS_XML="${CONF_DIR}/tomcat-users.xml"

# 애플리케이션 컨텍스트 경로 (배포된 webapp 루트). 비우면 WEBAPPS_DIR 전체를 본다.
# WEB-11(경로 분리) 조치로 docBase를 WAS 설치 경로 밖으로 분리 → conf/Catalina/localhost/bookstore.xml 의 docBase 와 일치시킬 것.
APP_CONTEXT_DIR="/srv/bookstore"

# ── 활성 앱(webapp) 내부 설정 점검 ─────────────────────────────
# true 면 컨테이너(conf/) 외에 '현재 배포된 앱'의 내부 설정 파일도 함께 점검한다.
#   (WEB-04/05/06/08/12/13/14/15/19/22/24 가 앱 설정까지 합산해 유효 설정 기준으로 판정)
CHECK_APP_CONFIG="true"
APP_WEB_XML="${APP_CONTEXT_DIR}/WEB-INF/web.xml"        # 앱 배포서술자
APP_META_CONTEXT="${APP_CONTEXT_DIR}/META-INF/context.xml"  # 앱 Context 설정
# 앱 DB 연결/시크릿 설정이 들어있는 디렉터리 (Spring xml, *.properties) — WEB-13/14 점검 대상
APP_CONFIG_DIR="${APP_CONTEXT_DIR}/WEB-INF/classes"

# ─────────────────────────────────────────────────────────────
# 2. 관리자 계정 (WEB-01 / WEB-02)
# ─────────────────────────────────────────────────────────────
# 실제 운영에서 사용하는(정상) 관리자 계정명. 이 이름이면 '변경됨'으로 본다.
# 공백으로 여러 개 나열 가능.
ADMIN_USER_NAMES="checkadm"

# 기본/추측 쉬운 계정명 (이 목록에 있으면 WEB-01 취약)
DEFAULT_ADMIN_NAMES="tomcat admin manager root administrator role1 both"

# 취약 비밀번호 - 단순 사전 단어 (WEB-02, 평문 저장 시 부분일치 검사). 공백 구분.
WEAK_PASSWORDS="tomcat admin manager root password passwd changeit qwerty letmein welcome secret"

# 취약 비밀번호 - 정규표현식(ERE) 패턴 배열 (WEB-02).
#   평문 비밀번호가 아래 패턴 중 하나라도 매칭되면 취약. grep -iE 로 검사(대소문자 무시).
#   ※ 비밀번호에 작은따옴표가 들어가는 환경이면 해당 패턴만 따옴표 처리 주의.
WEAK_PASSWORD_REGEX=(
  '^.{0,7}$'                                            # 8자 미만 (KISA: 최소 8자)
  '^[A-Za-z]+$'                                         # 영문자만으로 구성
  '^[0-9]+$'                                            # 숫자만으로 구성
  '(0123|1234|2345|3456|4567|5678|6789|7890|9876|8765|7654|6543|5432|4321|3210)'  # 연속 숫자
  '(abcd|bcde|cdef|defg|efgh|qwer|wert|erty|asdf|sdfg|zxcv|xcvb)'                 # 연속/키보드 문자
  '(.)\1\1\1'                                           # 같은 문자 4회 이상 반복 (1111, aaaa 등, grep -P 필요)
  '(admin|administrator|root|tomcat|manager|password|passwd|changeit|qwerty|letmein|welcome|secret)'  # 사전 단어 포함
)

# ─────────────────────────────────────────────────────────────
# 3. 프로세스 / 서비스 (WEB-09)
# ─────────────────────────────────────────────────────────────
TOMCAT_SERVICE="tomcat9"               # systemd 유닛 이름 (systemctl show 로 User= 확인)
# Tomcat 프로세스가 구동되어야 하는 '정상(최소권한 전용)' 계정명. 공백으로 여러 개.
#   ※ 클라우드 기본 로그인 계정(ubuntu, ec2-user 등)은 보통 sudo 그룹이라 여기 넣지 말 것.
EXPECTED_RUN_USERS="tomcat tomcat9"
# 관리자 권한 계정명 (이 계정으로 구동 중이면 WEB-09 취약)
ADMIN_RUN_USERS="root"
# 관리자 권한 부여 그룹 — 구동 계정이 이 그룹에 속하면(sudo/wheel 등) 실질적 관리자 → 취약.
#   (adm 은 로그 읽기용이라 제외. 권한상승 가능한 그룹만 나열)
PRIVILEGED_GROUPS="root sudo wheel admin"

# ─────────────────────────────────────────────────────────────
# 4. 업로드 경로 (WEB-24)
# ─────────────────────────────────────────────────────────────
# WEB-24는 설정파일(web.xml/context.xml/Spring·properties)에서 업로드 설정과
# 실제 업로드 경로(uploadDir, upload.*path 값)를 '자동 추출'해 판정한다:
#   - 업로드 설정 없음            → 업로드 기능 미사용으로 판단(양호)
#   - 경로가 웹루트(webapp) 내부   → 취약
#   - 경로가 웹루트 외부 + other 접근 차단 → 양호
#   - 경로값이 전부 비어있고 내부 기본 경로(.../upload)가 존재 → 취약, 없으면 양호(S3 등 외부 추정)
# (별도 UPLOAD_DIR 입력은 더 이상 필요 없음 — 설정값에서 자동 추출)

# ─────────────────────────────────────────────────────────────
# 5. 패치 기준 (WEB-25)
# ─────────────────────────────────────────────────────────────
# 이 버전 이상이면 양호로 본다. sort -V 로 비교.
#   ※ 점검 시점의 '해당 브랜치 최신 릴리스'로 갱신할 것 (https://tomcat.apache.org/download-90.cgi).
#   ※ 기준값 근거: Tomcat 9.0.118 = 9.0.x 최신(2026-05-01 릴리스). 9.0.x 지원종료(EOL)=2027-03-31.
#      → EOL(2027-03-31) 이후에는 9.0.x 자체가 취약(미지원 브랜치)이므로, 그 시점엔
#        지원 브랜치(9.1.x/10.1.x/11.x)로 이관 여부를 수동 확인해야 함. (본 스크립트는 EOL 판정 불가)
MIN_TOMCAT_VERSION="9.0.118"

# ─────────────────────────────────────────────────────────────
# 6. 권한 기준값 (WEB-03 / WEB-14 / WEB-26)  — 8진수 숫자만
# ─────────────────────────────────────────────────────────────
PASSWD_FILE_MAX_PERM="600"             # tomcat-users.xml 최대 허용 권한
CONF_FILE_MAX_PERM="750"               # 주요 설정 파일 최대 허용 권한
DB_CONF_MAX_PERM="600"                 # DB 연결 리소스 포함 설정 파일 최대 허용 권한 (WEB-13)
LOG_DIR_MAX_PERM="750"                 # 로그 디렉터리 최대 허용 권한
LOG_FILE_MAX_PERM="640"                # 로그 파일 최대 허용 권한

# ─────────────────────────────────────────────────────────────
# 7. 출력
# ─────────────────────────────────────────────────────────────
# 결과(로우데이터 CSV + 보고서 TXT) 저장 디렉터리. 없으면 생성한다(쓰기는 결과파일에 한함).
OUTPUT_DIR="./was_diag_result"
# 진단 대상 식별용 라벨 (보고서/파일명에 사용). 비우면 hostname 사용.
TARGET_LABEL=""
